steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "Starting build for API: $$NEXT_PUBLIC_API_BASE_URL"

        npm run build

    env:
      - 'NEXT_PUBLIC_API_BASE_URL=${_NEXT_PUBLIC_API_BASE_URL}'

  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-d'
      - '-r'
      - './out'
      - 'gs://www.parkos.space'

  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil web set -m index.html -e 404.html gs://www.parkos.space
        gsutil iam ch allUsers:objectViewer gs://www.parkos.space
        gsutil -m setmeta -h "Content-Type:application/javascript" gs://www.parkos.space/_next/static/**/*.js
        gsutil -m setmeta -h "Content-Type:text/css" \
        gs://www.parkos.space/_next/static/**/*.css
        gsutil -m setmeta -h "Cache-Control:public,max-age=31536000,immutable" \
        gs://www.parkos.space/_next/static/**
        gsutil -m setmeta -h "Cache-Control:no-cache,no-store,must-revalidate" \
        gs://www.parkos.space/**/*.html

options:
  logging: CLOUD_LOGGING_ONLY