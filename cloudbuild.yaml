steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "Starting build for API: $$NEXT_PUBLIC_API_BASE_URL"

        npm run build

    env:
      - 'NEXT_PUBLIC_API_BASE_URL=${_NEXT_PUBLIC_API_BASE_URL}'

  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-d'
      - '-r'
      - './out'
      - 'gs://www.parkos.space'

  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil web set -m index.html -e 404.html gs://www.parkos.space
        gsutil iam ch allUsers:objectViewer gs://www.parkos.space

        # gsutil does not support ** globs — use ls -r with loops instead
        gsutil ls -r gs://www.parkos.space/_next/static/ | grep '\.js$' | xargs -I{} gsutil setmeta -h "Content-Type:application/javascript" {}
        gsutil ls -r gs://www.parkos.space/_next/static/ | grep '\.css$' | xargs -I{} gsutil setmeta -h "Content-Type:text/css" {}
        gsutil ls -r gs://www.parkos.space/_next/static/ | grep -v ':$' | xargs -I{} gsutil setmeta -h "Cache-Control:public,max-age=31536000,immutable" {}
        gsutil ls -r gs://www.parkos.space/ | grep '\.html$' | xargs -I{} gsutil setmeta -h "Cache-Control:no-cache,no-store,must-revalidate" {}

options:
  logging: CLOUD_LOGGING_ONLY
